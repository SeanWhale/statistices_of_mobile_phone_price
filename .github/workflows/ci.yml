name: EFR Team Web Crawler CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # 必须开启写入权限，否则镜像推不上去
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt fastapi uvicorn httpx pytest

    - name: Run Integration Tests
      run: |
        # 验证 API 是否健康
        python -m pytest code_python/test_api.py

    # ---  核心：由 GitHub 代替你的本地 Docker 进行构建 ---
    - name: Log in to GHCR (GitHub Container Registry)
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        # 镜像名字会自动变为: ghcr.io/你的用户名/仓库名:latest
        tags: ghcr.io/${{ github.repository }}:latest