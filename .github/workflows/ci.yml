name: EFR Team Web Crawler CI/CD

on:
  push:
    branches: [ main, feature/agents-doc ] # 增加当前的分支名
  pull_request:
    branches: [ main ] # PR 时自动检查

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # 必须开启写入权限，否则镜像推不上去
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt fastapi uvicorn httpx pytest

    - name: Run Integration Tests
      run: |
        # 验证 API 是否健康
        python -m pytest code_python/test_api.py

    # ---  核心：由 GitHub 代替你的本地 Docker 进行构建 ---
    - name: Log in to GHCR (GitHub Container Registry)
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # --- 🚀 修正版：增加小写转换逻辑 ---
    - name: Lowercase the repo name
      run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

    - name: Log in to GHCR (GitHub Container Registry)
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        # 使用我们刚才转换好的小写变量 ${{ env.REPO_LOWER }}
        tags: ghcr.io/${{ env.REPO_LOWER }}:latest