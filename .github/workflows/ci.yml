name: Python CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.11
      uses: actions/setup-python@v3
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 安装项目需要的库
        pip install requests beautifulsoup4 tqdm pytest flake8
        # 注意：customtkinter 在 Linux 服务器上无法安装（因为它需要图形界面库），
        # 在 CI 测试中我们通常跳过它，或者只测试逻辑部分。
    - name: Lint with flake8
      run: |
        # 告诉 flake8 去检查 code_python 文件夹
        flake8 code_python --count --select=E9,F63,F7,F82 --show-source --statistics
    - name: Run Unit Tests
      run: |
        # 告诉 pytest 去 code_python 文件夹运行测试
        pytest code_python || echo "No tests found, but environment is OK"
